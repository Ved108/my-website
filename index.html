<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Hindu Mantras</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Hindu Mantras</h1>
    <p>Select a mantra to see the lyrics:</p>

    <select id="mantraSelect" onchange="showLyrics(this.value)">
        <option value="">--Select a Mantra--</option>
        <option value="ganesh">Ganesh Mantra</option>
        <option value="durga">Durga Mantra</option>
        <option value="lakshmi">Lakshmi Mantra</option>
        <option value="shiva">Shiva Mantra</option>
        <option value="vishnu">Vishnu Mantra</option>
        <option value="saraswati">Saraswati Mantra</option>
        <option value="hanuman">Hanuman Mantra</option>
        <option value="krishna">Krishna Mantra</option>
        <option value="rama">Rama Mantra</option>
        <option value="narasimha">Narasimha Mantra</option>
        <option value="mahadev">Mahadev Mantra</option>
        <option value="parvati">Parvati Mantra</option>
        <option value="kartikeya">Kartikeya Mantra</option>
        <option value="gayatri">Gayatri Mantra</option>
        <option value="mahamrityunjaya">Mahamrityunjaya Mantra</option>
        <!-- Add more up to 50 mantras here -->
    </select>

    <div id="lyrics" class="lyrics-box"></div>

    <script src="script.js"></script>
</body>
</html>
